<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Расписание · Админка</title>
  <link rel="stylesheet" href="/admin/style.css">
</head>
<body>
  <div class="header">
    <h1>📅 Редактор расписания</h1>
    <a href="/admin/">← Назад</a>
  </div>
  <main>
    <div id="items"></div>
    <button class="btn" onclick="add()">+ Добавить</button>
  </main>
  <script>
    const TOKEN = localStorage.getItem('admin-token');
    if (!TOKEN) { window.location.href = '/admin/login'; }

    let _data = [];

    async function load() {
      const res = await fetch('/api/admin/schedule', { headers: { 'X-Admin-Token': TOKEN } });
      _data = await res.json();
      render();
    }

    function render() {
      const days = ['Понедельник','Вторник','Среда','Четверг','Пятница'];
      document.getElementById('items').innerHTML = _data.map((item, i) => `
        <div class="item">
          <select onchange="edit(${i},'day',this.value)">${days.map(d => '<option'+(d===item.day?' selected':'')+'>'+d+'</option>').join('')}</select>
          <input value="${item.time||''}" placeholder="Время" onchange="edit(${i},'time',this.value)">
          <input value="${item.group||''}" placeholder="Класс" onchange="edit(${i},'group',this.value)">
          <input value="${item.note||''}" placeholder="Примечание" onchange="edit(${i},'note',this.value)">
          <button class="btn-del" onclick="remove(${i})">✕</button>
        </div>
      `).join('');
    }

    async function saveAll() {
      await fetch('/api/admin/schedule', {
        method: 'PUT',
        headers: { 'X-Admin-Token': TOKEN, 'Content-Type': 'application/json' },
        body: JSON.stringify(_data)
      });
    }

    function edit(idx, field, value) { _data[idx][field] = value; saveAll(); }

    async function remove(idx) { _data.splice(idx, 1); await saveAll(); load(); }

    async function add() {
      _data.push({ day: 'Понедельник', time: '', group: '', note: '' });
      await saveAll();
      load();
    }

    load();
  </script>
</body>
</html>
