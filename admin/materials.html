<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Материалы · Админка</title>
  <link rel="stylesheet" href="/admin/style.css">
</head>
<body>
  <div class="header">
    <h1>📚 Редактор материалов</h1>
    <a href="/admin/">← Назад</a>
  </div>
  <main>
    <div id="items"></div>
    <button class="btn" onclick="add()">+ Добавить материал</button>
  </main>
  <script>
    const TOKEN = localStorage.getItem('admin-token');
    if (!TOKEN) { window.location.href = '/admin/login'; }

    let _data = [];

    async function load() {
      const res = await fetch('/api/admin/materials', { headers: { 'X-Admin-Token': TOKEN } });
      _data = await res.json();
      render();
    }

    function render() {
      document.getElementById('items').innerHTML = _data.map(m => `
        <div class="item" style="flex-direction:column;align-items:stretch">
          <div style="display:flex;gap:8px;flex-wrap:wrap">
            <input value="${escape(m.title)}" placeholder="Название" onchange="set(${m.id},'title',this.value)" style="flex:2;min-width:150px">
            <input value="${escape(m.description)}" placeholder="Описание" onchange="set(${m.id},'description',this.value)" style="flex:2;min-width:150px">
            <input value="${escape(m.fileUrl)}" placeholder="Ссылка" onchange="set(${m.id},'fileUrl',this.value)" style="flex:1;min-width:120px">
            <input value="${escape(m.category)}" placeholder="Категория" onchange="set(${m.id},'category',this.value)" style="flex:1;min-width:100px">
            <button class="btn-del" onclick="del(${m.id})">✕</button>
          </div>
        </div>
      `).join('');
    }

    function escape(s) { return String(s).replace(/"/g,'&quot;').replace(/</g,'&lt;'); }

    function set(id, field, value) {
      const item = _data.find(m => m.id === id);
      if (item) { item[field] = value; save(id); }
    }

    async function save(id) {
      const item = _data.find(m => m.id === id);
      if (!item) return;
      await fetch('/api/admin/materials/'+id, {
        method: 'PUT', headers: { 'X-Admin-Token': TOKEN, 'Content-Type': 'application/json' },
        body: JSON.stringify(item)
      });
    }

    async function del(id) {
      if (!confirm('Удалить?')) return;
      await fetch('/api/admin/materials/'+id, { method: 'DELETE', headers: { 'X-Admin-Token': TOKEN } });
      load();
    }

    async function add() {
      await fetch('/api/admin/materials', {
        method: 'POST', headers: { 'X-Admin-Token': TOKEN, 'Content-Type': 'application/json' },
        body: JSON.stringify({ title: 'Новый материал', description: '', fileUrl: '', category: '' })
      });
      load();
    }

    load();
  </script>
</body>
</html>
