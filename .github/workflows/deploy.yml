name: Deploy frontend

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Copy files to server
        uses: appleboy/scp-action@v0.1.7
        with:
          host: 167.17.180.127
          username: root
          key: ${{ secrets.DEPLOY_KEY }}
          source: "."
          target: "/opt/teacher/teacher-backend/frontend"
          strip_components: 0

      - name: Reload nginx
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: 167.17.180.127
          username: root
          key: ${{ secrets.DEPLOY_KEY }}
          script: |
            docker exec teacher-nginx nginx -s reload 2>/dev/null || docker restart teacher-nginx
