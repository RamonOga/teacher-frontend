name: Deploy backend

on:
  push:
    branches: [main]

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: maven

      - name: Build with Maven
        run: mvn package -DskipTests -q

      - name: Copy files to server
        uses: appleboy/scp-action@v0.1.7
        with:
          host: 167.17.180.127
          username: root
          key: ${{ secrets.DEPLOY_KEY }}
          source: "target/*.jar,docker-compose.yml,Dockerfile,nginx.conf"
          target: "/opt/teacher/teacher-backend"
          strip_components: 0

      - name: Restart containers
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: 167.17.180.127
          username: root
          key: ${{ secrets.DEPLOY_KEY }}
          script: |
            cd /opt/teacher/teacher-backend
            docker-compose up --build -d
            docker system prune -f
